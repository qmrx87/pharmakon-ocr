# =============================================================================
# configs/detection/rfdetr_medium.yaml  —  RF-DETR (medium) detector config.
#
# Hyperparameters ONLY. The class list / count is NOT here: it is read at
# runtime from configs/classes.yaml (single source of truth) so the detector
# head width can never drift from the schema. `num_classes: null` below is a
# deliberate sentinel — vignocr.detection.train fills it from get_classes().
# =============================================================================
schema_version: 1

model:
  # RF-DETR variant. Maps to rfdetr.RFDETRMedium (see src/vignocr/detection/*).
  name: rfdetr_medium
  # num_classes is resolved from classes.yaml at runtime — DO NOT hardcode the
  # count here. Kept null so a stale duplicate can't silently mis-size the head.
  num_classes: null
  # Square training/inference resolution. RF-DETR medium is trained at 640.
  resolution: 640
  pretrained: true            # start from COCO-pretrained RF-DETR weights

train:
  epochs: 50
  batch_size: 4               # CPU-smoke friendly; raise on Narval A100 (e.g. 16)
  grad_accum_steps: 4         # effective batch = batch_size * grad_accum_steps
  lr: 1.0e-4                  # transformer/decoder LR
  lr_backbone: 1.0e-5         # backbone fine-tune LR (lower than the head)
  weight_decay: 1.0e-4
  optimizer: adamw
  lr_scheduler: cosine
  warmup_epochs: 1
  clip_max_norm: 0.1          # gradient clipping (DETR-family default)
  num_workers: 2
  seed: 1337                  # mirrors data.yaml synthetic seed; overridable
  early_stop:
    enabled: true
    monitor: map             # watch validation mAP@[.5:.95]
    mode: max
    patience: 10             # epochs without improvement before stopping
    min_delta: 0.001
  checkpoint:
    # Checkpoints land on SCRATCH (Narval), never in the repo. Resolved at
    # runtime: env VIGNOCR_SCRATCH if set, else this path under the repo.
    dir: scratch/detection/rfdetr_medium
    save_best: true
    save_last: true          # `checkpoint_last.pth` enables resume
    metric: map

# ---------------------------------------------------------------------------
# Augmentation — BAND-COLOR-PRESERVING (critical safety constraint).
#
# WHY: the `color_band` class drives CHIFA reimbursability (green = remboursable,
# red = non remboursable, orange = à vérifier). That signal lives ENTIRELY in
# HUE. Any augmentation that shifts hue, swaps/permutes RGB channels, or applies
# strong saturation/color jitter could turn a green band reddish (or vice-versa)
# while the COCO label still says "green" — teaching the model to invert a
# medical eligibility decision. That is unacceptable, so those ops are FORBIDDEN.
#
# ALLOWED:
#   * geometric — skew/rotate/scale/crop/flip: move boxes, never recolor them.
#   * photometric that preserves hue — brightness, contrast, gamma, gaussian
#     blur, defocus, glare/illumination, sensor noise, JPEG compression.
#     (These model phone-camera capture conditions without touching hue.)
# FORBIDDEN (hard rule — keep `enabled: false`):
#   * hue_shift / ChannelShuffle / RGBShift / channel swaps
#   * strong saturation or full HSV/color jitter that can cross green<->red
#   * any grayscale conversion (destroys the band signal entirely)
# Implementations (detection/train.py) MUST assert the forbidden block stays off.
# ---------------------------------------------------------------------------
augmentation:
  enabled: true
  geometric:
    horizontal_flip: 0.5      # box semantics are flip-invariant here
    vertical_flip: 0.0        # vignettes have a canonical up; keep it
    rotate_deg: 7             # small in-plane rotation (camera tilt)
    scale: [0.85, 1.15]       # zoom in/out
    translate_frac: 0.06
    shear_deg: 4              # mild skew
    random_resized_crop: 0.3  # probability of a resized crop
  photometric:                # HUE-PRESERVING ONLY
    brightness: 0.20          # +/- relative brightness
    contrast: 0.20
    gamma: [0.85, 1.15]
    gaussian_blur_p: 0.15     # capture blur
    motion_blur_p: 0.10
    glare_p: 0.10             # bright illumination patch
    gauss_noise_p: 0.15       # sensor noise
    jpeg_compression_p: 0.15  # recompression artefacts
    saturation: 0.0           # 0 == DISABLED on purpose (would risk green<->red)
  forbidden:                  # documented + asserted-off; never enable.
    hue_shift: false
    channel_shuffle: false
    rgb_shift: false
    to_grayscale: false
    color_jitter_strong: false

eval:
  # Detection confidence floor for predict-time NMS / reporting.
  score_threshold: 0.30
  iou_threshold: 0.50         # for localization-recall TP matching (mAP uses .5:.95)
  max_detections: 100

export:
  opset: 17                   # ONNX opset for the torch->onnx export
  parity_atol: 1.0e-3         # absolute tolerance for the torch-vs-onnxruntime check
  parity_rtol: 1.0e-3
  dynamic_batch: false        # fixed 1xNxHxW graph (simpler TensorRT build)
