# =============================================================================
# configs/data.yaml  —  dataset location + COCO layout.
# Switchover to real data = change `active: synthetic` -> `active: real`.
# (see docs/SWITCHOVER.md for the validation checklist)
# =============================================================================
schema_version: 1

# TODO(real-data): flip to `real` once ocr/data is annotated to configs/classes.yaml.
# Override at runtime with env VIGNOCR_DATA_ACTIVE=real (12-factor; no code change).
active: synthetic

datasets:
  synthetic:
    root: fixtures/synthetic                 # generated by src/vignocr/data/synthetic.py
    coco_filename: _annotations.coco.json     # one per split dir (Roboflow convention)
    splits: { train: train, val: valid, test: test }
    image_size: [640, 640]
    generate: true                            # (re)generate deterministically on demand
    num_images: { train: 12, val: 4, test: 4 }
    seed: 1337

  real:
    root: data                                # pharmakon-ocr/data/  (Roboflow COCO export, Algeria-Drug-label)
    coco_filename: _annotations.coco.json
    splits: { train: train, val: valid, test: test }
    image_size: [640, 640]
    generate: false
    # ---- Real-data reconciliation (Algeria-Drug-label v1, 773 imgs, exported 2026-06-03) ----
    # The real annotation names some classes differently and omits a few of ours.
    # These knobs translate real -> schema at load time WITHOUT silently changing
    # classes.yaml (the target schema stays a single source of truth).
    coco_aliases:                              # real -> schema name
      lot: num_lot
      tarif_ref: tr                            # the Tarif de Référence box
    coco_ignore: [drug-labels, text]           # root category + generic text — not detection classes
    bbox_clamp_tolerance: 2.0                 # px; clamp Roboflow sub-pixel OOB artifacts (y=-0.01 etc.)
    business_critical_present_severity: warn  # prix+shp are COMBINED into ppa_shp in this annotation; warn, do not error
    # 🛑 Three schema-level decisions still owed before training (see top of file / docs/SWITCHOVER.md):
    #   1. handle ppa_shp (combined box) via OCR-splits-two-numbers to preserve checksum?
    #   2. add `tr` (tarif_ref, 252 train anns) as a detection class?
    #   3. fallback for missing color_band (no reimbursability annotation) — return "unknown"?

nomenclature:
  source_xlsx: NOMENCLATURE-VERSION-FEVRIER-2026-.xlsx   # real reference (1.4 MB, Feb 2026)
  csv: fixtures/nomenclature.csv                          # synthetic fixture now; ingest real via scripts/ingest_nomenclature.py

# Split-integrity invariants asserted by src/vignocr/data/validate.py on load.
integrity:
  assert_no_image_leakage_across_splits: true     # by file_name stem + perceptual hash
  assert_every_annotation_valid_bbox: true        # 0<=x, 0<=y, w>0, h>0, within image
  assert_class_names_subset_of_schema: true       # every COCO category name must exist in classes.yaml
  assert_all_business_critical_present: true       # each split covers business_critical_fields (warn on real until annotated)
