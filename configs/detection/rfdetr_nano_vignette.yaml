# =============================================================================
# configs/detection/rfdetr_nano_vignette.yaml — V2 shared front-end:
# NANO vignette-region detector (same task & data as Stage A, smaller model).
#
# Both v2 variants (Donut VLM + full-page docTR) consume a clean vignette crop;
# this nano cropper exists so the v2 hot path spends single-digit ms on
# localization. Train it with the EXISTING Stage A job — no new code:
#
#   VIGNOCR_DETECTION_CONFIG=detection/rfdetr_nano_vignette \
#     sbatch --account=$VIGNOCR_ACCOUNT slurm/02a_train_vignette.sbatch
#
# Pretrained cache is variant-aware (train.py probes rfdetr_nano_coco.pth), so
# fetch the nano weights once on the login node first:
#   VIGNOCR_RFDETR_SIZE=nano bash scripts/fetch_pretrained.sh
#
# CLASS SEMANTICS (same data2 reality as rfdetr_vignette.yaml):
#   vin    = WIDE vignette body  -> crop target
#   entete = narrow vertical lot/dates strip inside it
# =============================================================================
schema_version: 1

dataset: vignette

model:
  name: rfdetr_nano                # resolved via _resolve.resolve_model_class
  num_classes: 3
  class_names: [date_info, entete, vin]
  resolution: 416
  pretrained: true

train:
  epochs: 40                       # nano is cheaper per epoch; a few more help
  batch_size: 16
  grad_accum_steps: 1
  lr: 1.0e-4
  lr_backbone: 1.0e-5              # mapped to rfdetr's lr_encoder by train.py
  weight_decay: 1.0e-4
  optimizer: adamw
  lr_scheduler: cosine
  warmup_epochs: 1
  seed: 1337
  early_stop: { enabled: true, monitor: map, mode: max, patience: 10, min_delta: 0.001 }
  checkpoint:
    dir: scratch/detection/rfdetr_nano_vignette
    save_best: true
    save_last: true
    metric: map

# Same band-color-preserving policy as every detector config (asserted by
# detection/train.run — hue ops would corrupt CHIFA band semantics downstream).
augmentation:
  enabled: true
  geometric:
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotate_deg: 7
    scale: [0.85, 1.15]
    translate_frac: 0.06
    shear_deg: 4
    random_resized_crop: 0.3
  photometric:
    brightness: 0.20
    contrast: 0.20
    gamma: [0.85, 1.15]
    gaussian_blur_p: 0.15
    motion_blur_p: 0.10
    glare_p: 0.10
    gauss_noise_p: 0.15
    jpeg_compression_p: 0.15
    saturation: 0.0
  forbidden:
    hue_shift: false
    channel_shuffle: false
    rgb_shift: false
    to_grayscale: false
    color_jitter_strong: false

eval:
  score_threshold: 0.30
  iou_threshold: 0.50
  max_detections: 5

export:
  opset: 17
  parity_atol: 1.0e-3
  parity_rtol: 1.0e-3
  dynamic_batch: false
